# Excavator auto-updates this file. Please contribute improvements to the central template:
# https://github.palantir.build/excavator-checks/circle-templates/blob/develop/excavator/circleci/templates/rust-library.config.yml
# To manually manage the CircleCI configuration for this project, remove the .circleci/template.sh file.

orbs:
  cache: palantir-orbs/circle-cache@volatile
  secret-injector: palantir-orbs/secret-injector@0.1.0

aliases:
  - &install-toolchains
    run:
      name: Install Rust toolchains
      command: rustup show active-toolchain || rustup toolchain install

version: 2.1
jobs:
  build:
    docker: [{ image: "docker.palantir.build/circle2-build-images/ubuntu-jammy-standard:1.61.0@sha256:01ff5b353f733b00aeba5ea7c045795adc96e05c3a9335545fd87a924e9e8ddf" }]
    resource_class: large
    environment:
      RUSTFLAGS: -Dwarnings
      CARGO_BUILD_JOBS: 4
      RUST_BACKTRACE: 1
    steps:
      - checkout
      - *install-toolchains
      - cache/restore: { keys: registry- }
      - run: test -f Cargo.lock || cargo generate-lockfile
      - cache/restore: { keys: 'deps-v2-{{ checksum "rust-toolchain.toml" }}-{{ checksum "Cargo.lock" }}' }
      - run: cargo fmt --all -- --check
      - run: |
          cargo clippy --all --all-targets --locked
      - run: |
          cargo test --all --locked
      - cache/save:
          key: registry-{{ .BuildNum }}
          paths: /usr/local/cargo/registry/index
      - cache/save:
          key: 'deps-v2-{{ checksum "rust-toolchain.toml" }}-{{ checksum "Cargo.lock" }}'
          paths: |
            target
            /usr/local/cargo/git
            /usr/local/cargo/registry/src
            /usr/local/cargo/registry/cache
      - secret-injector/check
      - run: |
          if [[ -z ${CIRCLE_TAG+x} ]]; then
            exit 0
          fi

          manifests=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages|map(.manifest_path)|.[]')
          for manifest in $manifests; do
            # FIXME do better in 1.39.0: https://github.com/rust-lang/cargo/pull/7354
            if grep -q "publish = false" "$manifest"; then
              continue
            fi

            cargo publish \
              --registry palantir \
              --token "Basic $(echo -n $ARTIFACTORY_USERNAME:$ARTIFACTORY_PASSWORD | base64 -w0)" \
              --manifest-path "$manifest" \
              --no-verify
          done

  circle-all:
    docker: [{ image: 'hub.docker.palantir.build/busybox:1.36.1@sha256:6d9ac9237a84afe1516540f40a0fafdc86859b2141954b4d643af7066d598b74' }]
    resource_class: small
    steps:
      - run: {command: echo "All required jobs finished successfully"}

workflows:
  version: 2
  build:
    jobs:
      - build:
          filters: { tags: { only: /.*/ } }

      # Catch-all for all required checks
      - circle-all:
          requires: [ build ]
          filters: { tags: { only: /.*/ } }

notify:
  webhooks:
    - url: https://parana.palantir.build/hook
